name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write   # 关键：授予 Release 创建权限

env:
  PROJECT_PATH: '.'        # 项目文件/解决方案路径
  OUTPUT_DIR: './publish'
  APP_NAME: 'Zinc Code'    # 应用名称（含空格）

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_ENV

      # ---------- 发布（不含运行时） ----------
      - name: Publish (framework-dependent)
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o "${{ env.OUTPUT_DIR }}/win-x64/framework-dependent"

      - name: Zip (framework-dependent)
        run: |
          Compress-Archive -Path "${{ env.OUTPUT_DIR }}/win-x64/framework-dependent/*" `
            -DestinationPath "${{ env.APP_NAME }}-${{ env.VERSION }}-win-x64-framework-dependent.zip"

      # ---------- 发布（含运行时） ----------
      - name: Publish (self-contained)
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o "${{ env.OUTPUT_DIR }}/win-x64/self-contained"

      - name: Zip (self-contained)
        run: |
          Compress-Archive -Path "${{ env.OUTPUT_DIR }}/win-x64/self-contained/*" `
            -DestinationPath "${{ env.APP_NAME }}-${{ env.VERSION }}-win-x64-self-contained.zip"

      # ---------- 生成 Release 说明 ----------
      - name: Generate Release Notes
        id: release_notes
        shell: pwsh
        run: |
          $prevTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0) { $prevTag = "" }
          if ($prevTag) {
              $notes = git log $prevTag..HEAD --pretty=format:"- %s"
          } else {
              $notes = git log --pretty=format:"- %s"
          }
          if (Test-Path "RELEASE_NOTES.md") {
              $notes = Get-Content "RELEASE_NOTES.md" -Raw
          }
          $delimiter = "EOF_NOTES"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "notes<<$delimiter"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $notes
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter

      # ---------- 创建 Release 并上传产物 ----------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}
            ${{ steps.release_notes.outputs.notes }}
          files: |
            ${{ env.APP_NAME }}-${{ env.VERSION }}-win-x64-framework-dependent.zip
            ${{ env.APP_NAME }}-${{ env.VERSION }}-win-x64-self-contained.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}